name: Release npm

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.name, 'stac-wasm-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/wasm
    environment:
      name: npm
      url: https://www.npmjs.com/package/stac-wasm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: cargo-bins/cargo-binstall@aaa84a43aec4955a42c5ffc65d258961e39f276e # v1.19.1
      - name: Install wasm-pack
        run: cargo binstall wasm-pack --no-confirm
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build wasm
        run: wasm-pack build
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        run: npm publish ./pkg --provenance --access public
