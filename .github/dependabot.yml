version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: []
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: []
    groups:
      geoarrow:
        patterns:
          - "geoarrow-*"
          - "geoparquet"
          - "arrow-*"
          - "parquet"
          - "object_store"
      jsonschema:
        patterns:
          - "jsonschema"
          - "referencing"
    cooldown:
      default-days: 7
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: []
    cooldown:
      default-days: 7
